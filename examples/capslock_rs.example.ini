; CapsLock RS example configuration for milestone 2.
;
; Copy the mappings you want into capslock_rs.ini, or point CAPSLOCK_RS_CONFIG
; to this file when trying a separate configuration.
;
; Source syntax:
;   caps_<optional modifiers>_<key>
;
; Modifier order is normalized internally. For example caps_shift_lalt_j and
; caps_lalt_shift_j describe the same source combo.
;
; Action syntax:
;   keyFunc_name(optional_count)  built-in editing action
;   keyTarget_key                 send a single target key
;   keyCombo_modifier_key         send a target key combo

[general]
enabled = true
start_with_windows = false
run_as_admin = false
show_tray_icon = true
tap_capslock = toggle

[Keys]
; Basic navigation.
caps_h=keyFunc_moveLeft
caps_j=keyFunc_moveDown
caps_k=keyFunc_moveUp
caps_l=keyFunc_moveRight
caps_space=keyFunc_enter
caps_q=keyFunc_backspace
caps_e=keyFunc_delete

; Repeated movement.
caps_z=keyFunc_moveUp(5)
caps_x=keyFunc_moveDown(5)

; Word movement.
caps_lalt_a=keyFunc_moveWordLeft
caps_lalt_d=keyFunc_moveWordRight

; Selection.
caps_shift_h=keyFunc_selectLeft
caps_shift_j=keyFunc_selectDown
caps_shift_k=keyFunc_selectUp
caps_shift_l=keyFunc_selectRight
caps_lalt_shift_a=keyFunc_selectWordLeft
caps_lalt_shift_d=keyFunc_selectWordRight

; Editing helpers.
caps_a=keyFunc_home
caps_semicolon=keyFunc_end
caps_page_up=keyFunc_pageUp
caps_page_down=keyFunc_pageDown
caps_w=keyFunc_deleteWord
caps_s=keyFunc_forwardDeleteWord

; Target single keys.
caps_r=keyTarget_f5
caps_t=keyTarget_tab
caps_escape=keyTarget_escape
caps_m=keyTarget_media_play_pause

; Target key combos.
caps_c=keyCombo_ctrl_c
caps_v=keyCombo_ctrl_v
caps_y=keyCombo_ctrl_y
caps_o=keyCombo_ctrl_shift_left
caps_p=keyCombo_ctrl_shift_right

; Multi-modifier source combos.
caps_ctrl_shift_h=keyCombo_ctrl_shift_left
caps_ctrl_shift_l=keyCombo_ctrl_shift_right
caps_lalt_shift_j=keyFunc_selectDown(5)

[ui]
settings_backend = ini
settings_page = future