; CapsLock RS current configuration.
;
; Source keys are written as caps_<optional modifiers>_<key>.
; Supported modifiers: ctrl/lctrl/rctrl/alt/lalt/ralt/shift/lshift/rshift/win/lwin/rwin.
; Examples: caps_h, caps_lalt_a, caps_ctrl_shift_left.
;
; Actions support three forms:
; - keyFunc_name(optional_count): built-in editing action, for example keyFunc_moveUp(5)
; - keyTarget_key: send one target key, for example keyTarget_f5
; - keyCombo_modifier_key: send a target combo, for example keyCombo_ctrl_c
;
; This file keeps only conservative defaults enabled. More examples are in examples/capslock_rs.example.ini.

[general]
enabled = true
start_with_windows = false
run_as_admin = false
show_tray_icon = true
tap_capslock = toggle

[Keys]
caps_h=keyFunc_moveLeft
caps_j=keyFunc_moveDown
caps_k=keyFunc_moveUp
caps_l=keyFunc_moveRight
caps_space=keyFunc_enter
caps_q=keyFunc_backspace
caps_e=keyFunc_delete
caps_backspace=keyFunc_deleteLine
caps_z=keyFunc_moveUp(5)
caps_x=keyFunc_moveDown(5)
caps_lalt_a=keyFunc_moveWordLeft
caps_lalt_d=keyFunc_moveWordRight

; Optional examples. Remove the leading semicolon to enable them.
; caps_r=keyTarget_f5
; caps_c=keyCombo_ctrl_c
; caps_lalt_shift_j=keyFunc_selectDown
; caps_u=keyFunc_selectUp(5)

[ui]
language = system
settings_backend = ini
settings_page = native
